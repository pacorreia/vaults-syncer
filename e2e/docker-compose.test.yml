version: '3.8'

services:
  # Mock Vault Servers for testing
  mock-vaults:
    build:
      context: ..
      dockerfile: e2e/Dockerfile.mock-vault
    container_name: mock-vaults
    networks:
      - sync-network
    ports:
      - "8000:8000"
      - "8001:8001"
    environment:
      - SOURCE_TOKEN=source_admin_token_12345
      - TARGET_TOKEN=target_admin_token_12345
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/alive"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 5s

  # Secrets Sync Daemon
  sync-daemon:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: secrets-sync-daemon
    networks:
      - sync-network
    environment:
      - MASTER_ENCRYPTION_KEY=aW50ZWdyYXRpb24tdGVzdC0zMmJ5dGUta2V5LW9rISE=
      - DB_TYPE=sqlite
      - DB_PATH=/app/data/sync.db
      - SERVER_PORT=8080
      - METRICS_PORT=9090
    ports:
      - "8080:8080"
      - "9090:9090"
    volumes:
      - sync_daemon_data:/app/data
    depends_on:
      mock-vaults:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/setup"]
      interval: 5s
      timeout: 3s
      retries: 6
      start_period: 10s

volumes:
  sync_daemon_data:
    driver: local
networks:
  sync-network:
    driver: bridge