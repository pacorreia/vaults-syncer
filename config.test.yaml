# Test configuration - syncing between two mock vault instances

vaults:
  # Source Mock Vault
  - id: vaultwarden_source
    name: "Source Mock Vault"
    type: vaultwarden
    endpoint: "http://mock-vaults:8000/api/ciphers"
    method: POST
    auth:
      method: bearer
      headers:
        token: "${VAULTWARDEN_SOURCE_TOKEN}"
    field_names:
      name_field: "name"
      value_field: "login"
    headers:
      Accept: "application/json"
      Content-Type: "application/json"
    timeout: 30
    skip_ssl_verify: true  # For local testing

  # Target Mock Vault
  - id: vaultwarden_target
    name: "Target Mock Vault"
    type: vaultwarden
    endpoint: "http://mock-vaults:8001/api/ciphers"
    method: POST
    auth:
      method: bearer
      headers:
        token: "${VAULTWARDEN_TARGET_TOKEN}"
    field_names:
      name_field: "name"
      value_field: "login"
    headers:
      Accept: "application/json"
      Content-Type: "application/json"
    timeout: 30
    skip_ssl_verify: true

# Sync from source to target
syncs:
  - id: vaultwarden_sync
    source: vaultwarden_source
    targets:
      - vaultwarden_target
    sync_type: unidirectional
    enabled: true
    schedule: "*/5 * * * *"  # Every 5 minutes for testing
    filter:
      patterns:
        - "*"  # Sync all secrets
      exclude: []
    retry_policy:
      max_retries: 3
      initial_backoff: 1000
      max_backoff: 30000
      multiplier: 2.0

# Server configuration
server:
  port: 8080
  address: 0.0.0.0
  metrics_port: 9090
  metrics_address: 0.0.0.0

# Logging configuration
logging:
  level: debug  # Debug for testing
  format: json
