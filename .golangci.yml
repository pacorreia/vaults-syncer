version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - ineffassign
    - goimports
    - misspell
    - godot
    - noctx
  settings:
    errcheck:
      check-type-assertions: true
      check-blank: false
    misspell:
      locale: US
  exclusions:
    rules:
      - path: "_test\\.go"
        linters:
          - godot

formatters:
  exclusions:
    paths:
      - vendor
      - testdata
      - site
