site_name: Secrets Vault Sync
site_description: Multi-vault secret synchronization daemon with OAuth 2.0 support
site_author: Paulo Correia
site_url: https://github.com/pacorreia/vaults-syncer

theme:
  name: material
  locale: en
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.path
    - toc.integrate
    - search.suggest
    - search.highlight
    - search.share
    - content.tabs.link
    - content.code.copy
    - content.code.select
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to light mode

  repo_url: https://github.com/pacorreia/vaults-syncer
  repo_name: pacorreia/vaults-syncer
edit_uri: edit/main/docs/

nav:
  - Home: index.md
  - Getting Started:
    - Introduction: getting-started/index.md
    - Quick Start: getting-started/quick-start.md
    - Installation: getting-started/installation.md
    - Requirements: getting-started/requirements.md
  - Configuration:
    - Overview: configuration/README.md
    - Vaults: configuration/vaults.md
    - Authentication: configuration/authentication.md
    - Syncs: configuration/syncs.md
  - Guides:
    - Quick Reference: guides/quick-reference.md
  - Development:
    - Overview: development/index.md
    - Testing: development/testing.md
    - Quick Start: development/quickstart.md

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - md_in_html
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
      emoji_index: !!python/name:material.extensions.emoji.twemoji
  - pymdownx.highlight:
      use_pygments: true
      line_spans: __span
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_div_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde
  - tables
  - footnotes
  - toc:
      permalink: true

plugins:
  - search

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/pacorreia/vaults-syncer
  analytics:
    provider: google
    property: UA-XXXXXXXXX-X

watch:
  - docs/
