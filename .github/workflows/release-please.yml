name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  packages: write

jobs:
  # ── Step 1: release-please manages CHANGELOG and version bump PR ────────────
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # ── Step 2: build binaries for all targets (runs only when a release is cut) ─
  build-binaries:
    name: Build (${{ matrix.target }})
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            target: linux-amd64
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            target: linux-arm64
          - os: windows-latest
            goos: windows
            goarch: amd64
            target: windows-amd64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.4'

      - name: Install Linux ARM64 cross-compiler
        if: matrix.goos == 'linux' && matrix.goarch == 'arm64'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build binary and packages
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ needs.release-please.outputs.tag_name }}
        run: |
          export CGO_ENABLED=1
          BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
          GIT_COMMIT=$(git rev-parse HEAD)
          BINARY="sync-daemon"
          LDFLAGS="-X main.Version=${VERSION} -X main.BuildDate=${BUILD_DATE} -X main.GitCommit=${GIT_COMMIT}"

          if [ "$GOOS" = "linux" ]; then
            [ "$GOARCH" = "arm64" ] && export CC=aarch64-linux-gnu-gcc
            export CGO_LDFLAGS="-static"
            go build -a -installsuffix cgo \
              -ldflags "-extldflags '-static' ${LDFLAGS}" \
              -o "${BINARY}" .

            # ── tar.gz ─────────────────────────────────────────────────────────
            tar czf "sync-daemon-${VERSION}-${{ matrix.target }}.tar.gz" "${BINARY}"

            # ── .deb package ───────────────────────────────────────────────────
            VERSION_CLEAN="${VERSION#v}"
            DEB_ARCH="${{ matrix.goarch }}"
            PKG_DIR="pkg_${DEB_ARCH}"
            mkdir -p "${PKG_DIR}/DEBIAN" "${PKG_DIR}/usr/bin"
            cp "${BINARY}" "${PKG_DIR}/usr/bin/sync-daemon"
            chmod 755 "${PKG_DIR}/usr/bin/sync-daemon"
            {
              echo "Package: vaults-syncer"
              echo "Version: ${VERSION_CLEAN}"
              echo "Architecture: ${DEB_ARCH}"
              echo "Maintainer: Paulo Correia <pacorreia@users.noreply.github.com>"
              echo "Description: Vault secret synchronisation daemon"
              echo " Syncs secrets between Vaultwarden instances on a configurable schedule."
              echo "Section: utils"
              echo "Priority: optional"
            } > "${PKG_DIR}/DEBIAN/control"
            dpkg-deb --build "${PKG_DIR}" "sync-daemon-${VERSION}-${{ matrix.target }}.deb"

          elif [ "$GOOS" = "windows" ]; then
            BINARY="${BINARY}.exe"
            go build -ldflags "${LDFLAGS}" -o "${BINARY}" .
            7z a "sync-daemon-${VERSION}-${{ matrix.target }}.zip" "${BINARY}"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: binary-${{ matrix.target }}
          path: |
            sync-daemon-*.tar.gz
            sync-daemon-*.zip
            sync-daemon-*.deb
          if-no-files-found: error
          retention-days: 5

  # ── Step 3a: attach binaries to the GitHub Release ──────────────────────────
  attach-release-assets:
    name: Attach Assets to Release
    runs-on: ubuntu-latest
    needs: [release-please, build-binaries]
    if: ${{ needs.release-please.outputs.release_created }}
    steps:
      - uses: actions/download-artifact@v8.0.1
        with:
          pattern: binary-*
          path: dist
          merge-multiple: true

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: dist/*

  # ── Step 3b: build and push Docker image to GHCR (parallel with step 3a) ───
  build-and-push-docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [release-please, build-binaries]
    if: ${{ needs.release-please.outputs.release_created }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get version tag (without v prefix)
        id: tag
        run: |
          TAG="${{ needs.release-please.outputs.tag_name }}"
          echo "version_tag=${TAG#v}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ needs.release-please.outputs.tag_name }}
            BUILD_DATE=${{ github.run_started_at }}
            GIT_COMMIT=${{ github.sha }}
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ steps.tag.outputs.version_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Step 3c: package and push Helm chart to GHCR OCI (parallel) ─────────────
  publish-helm-chart:
    name: Publish Helm Chart
    runs-on: ubuntu-latest
    needs: [release-please]
    if: ${{ needs.release-please.outputs.release_created }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set chart version from release tag
        id: chart_ver
        run: |
          TAG="${{ needs.release-please.outputs.tag_name }}"
          VERSION="${TAG#v}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Update Chart.yaml versions
        run: |
          VERSION="${{ steps.chart_ver.outputs.version }}"
          sed -i "s/^version:.*/version: ${VERSION}/" helm/vaults-syncer/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${VERSION}\"/" helm/vaults-syncer/Chart.yaml

      - name: Package Helm chart
        run: helm package helm/vaults-syncer --destination dist/

      - name: Push Helm chart to GHCR OCI registry
        run: |
          helm push dist/vaults-syncer-${{ steps.chart_ver.outputs.version }}.tgz \
            oci://ghcr.io/${{ github.repository_owner }}/charts
