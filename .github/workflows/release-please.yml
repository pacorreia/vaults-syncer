name: Release Please

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      release_as:
        description: 'Force a specific version (e.g. 1.2.3). Leave empty for normal release-please flow.'
        required: false

permissions:
  contents: write
  pull-requests: write
  packages: write

jobs:
  check-commit:
    name: Check Commit Prefix
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - name: Evaluate commit message
        id: check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          elif printf '%s\n' "${{ github.event.head_commit.message }}" | head -n 1 | grep -qE '^(feat|fix)(\([^)]*\))?!?:|^chore(\([^)]*\))?: release|^Merge pull request #[0-9]+ from .*/release-please--branches--'; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

  release-please:
    name: Release Please
    needs: check-commit
    if: needs.check-commit.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created || steps.release-forced.outputs.release_created || steps.forced-flag.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name || steps.release-forced.outputs.tag_name }}
    steps:
      - name: Run release-please
        uses: googleapis/release-please-action@v5
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.release_as == '')
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run release-please (on-demand with forced version)
        uses: googleapis/release-please-action@v5
        if: github.event_name == 'workflow_dispatch' && inputs.release_as != ''
        id: release-forced
        continue-on-error: true
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          release-as: ${{ inputs.release_as }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Ensure release_created for forced dispatch
        if: github.event_name == 'workflow_dispatch' && inputs.release_as != ''
        id: forced-flag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ steps.release-forced.outcome }}" = "failure" ]; then
            TAG="v${{ inputs.release_as }}"
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              -u "x-access-token:${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${{ github.repository }}/releases/tags/${TAG}")
            if [ "${STATUS}" != "200" ]; then
              echo "::error::release-please failed and release ${TAG} was not found (status ${STATUS})"
              exit 1
            fi
            echo "::warning::release-please step failed but release ${TAG} already exists — proceeding to publish artifacts"
          fi
          echo "release_created=true" >> "$GITHUB_OUTPUT"

  get-tag:
    name: Resolve Release Tag
    needs: release-please
    if: |
      needs.release-please.outputs.release_created == 'true' ||
      (github.event_name == 'workflow_dispatch' && inputs.release_as != '')
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.tag.outputs.tag_name }}
      version: ${{ steps.tag.outputs.version }}
    steps:
      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.release_as }}" ]; then
            TAG="v${{ inputs.release_as }}"
          else
            TAG="${{ needs.release-please.outputs.tag_name }}"
          fi
          echo "tag_name=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

  build-binaries:
    name: Build (${{ matrix.target }})
    needs: get-tag
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            target: linux-amd64
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            target: linux-arm64
          - os: windows-latest
            goos: windows
            goarch: amd64
            target: windows-amd64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.4'

      - name: Install Linux ARM64 cross-compiler
        if: matrix.goos == 'linux' && matrix.goarch == 'arm64'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build binary and packages
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ needs.get-tag.outputs.tag_name }}
        run: |
          export CGO_ENABLED=1
          BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
          GIT_COMMIT=$(git rev-parse HEAD)
          BINARY="sync-daemon"
          LDFLAGS="-X main.Version=${VERSION} -X main.BuildDate=${BUILD_DATE} -X main.GitCommit=${GIT_COMMIT}"

          if [ "$GOOS" = "linux" ]; then
            [ "$GOARCH" = "arm64" ] && export CC=aarch64-linux-gnu-gcc
            export CGO_LDFLAGS="-static"
            go build -a -installsuffix cgo \
              -ldflags "-extldflags '-static' ${LDFLAGS}" \
              -o "${BINARY}" .

            tar czf "sync-daemon-${VERSION}-${{ matrix.target }}.tar.gz" "${BINARY}"

            VERSION_CLEAN="${VERSION#v}"
            DEB_ARCH="${{ matrix.goarch }}"
            PKG_DIR="pkg_${DEB_ARCH}"
            mkdir -p "${PKG_DIR}/DEBIAN" "${PKG_DIR}/usr/bin"
            cp "${BINARY}" "${PKG_DIR}/usr/bin/sync-daemon"
            chmod 755 "${PKG_DIR}/usr/bin/sync-daemon"
            {
              echo "Package: vaults-syncer"
              echo "Version: ${VERSION_CLEAN}"
              echo "Architecture: ${DEB_ARCH}"
              echo "Maintainer: Paulo Correia <pacorreia@users.noreply.github.com>"
              echo "Description: Vault secret synchronisation daemon"
              echo " Syncs secrets between Vaultwarden instances on a configurable schedule."
              echo "Section: utils"
              echo "Priority: optional"
            } > "${PKG_DIR}/DEBIAN/control"
            dpkg-deb --build "${PKG_DIR}" "sync-daemon-${VERSION}-${{ matrix.target }}.deb"

          elif [ "$GOOS" = "windows" ]; then
            BINARY="${BINARY}.exe"
            go build -ldflags "${LDFLAGS}" -o "${BINARY}" .
            7z a "sync-daemon-${VERSION}-${{ matrix.target }}.zip" "${BINARY}"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: binary-${{ matrix.target }}
          path: |
            sync-daemon-*.tar.gz
            sync-daemon-*.zip
            sync-daemon-*.deb
          if-no-files-found: error
          retention-days: 5

  attach-release-assets:
    name: Attach Assets to Release
    runs-on: ubuntu-latest
    needs: [get-tag, build-binaries]
    steps:
      - uses: actions/download-artifact@v8.0.1
        with:
          pattern: binary-*
          path: dist
          merge-multiple: true

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.get-tag.outputs.tag_name }}
          files: dist/*

  build-and-push-docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [get-tag, build-binaries]
    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ needs.get-tag.outputs.tag_name }}
            BUILD_DATE=${{ github.run_started_at }}
            GIT_COMMIT=${{ github.sha }}
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ needs.get-tag.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish-helm-chart:
    name: Publish Helm Chart
    needs: get-tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Chart.yaml versions
        run: |
          VERSION="${{ needs.get-tag.outputs.version }}"
          sed -i "s/^version:.*/version: ${VERSION}/" helm/vaults-syncer/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${VERSION}\"/" helm/vaults-syncer/Chart.yaml

      - name: Package Helm chart
        run: helm package helm/vaults-syncer --destination dist/

      - name: Push Helm chart to GHCR OCI registry
        run: |
          helm push dist/vaults-syncer-${{ needs.get-tag.outputs.version }}.tgz \
            oci://ghcr.io/${{ github.repository_owner }}/charts

      - name: Upload chart to release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.get-tag.outputs.tag_name }}
          files: dist/vaults-syncer-${{ needs.get-tag.outputs.version }}.tgz
