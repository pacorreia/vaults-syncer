name: Go CI

on:
  push:
    branches:
      - main
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/go-ci.yml'
  pull_request:
    branches:
      - main
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'

permissions:
  contents: write
  pull-requests: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.22.1'

      - name: Download dependencies
        run: go mod download

      - name: Verify dependencies
        run: go mod verify

      - name: Check for available updates
        run: go list -u -m all

      - name: Build
        run: |
          VERSION=$(git describe --tags --always --dirty)
          BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
          GIT_COMMIT=$(git rev-parse HEAD)
          go build -v -ldflags "-X main.Version=${VERSION} -X main.BuildDate=${BUILD_DATE} -X main.GitCommit=${GIT_COMMIT}" ./...

      - name: Run tests with coverage
        run: go test -v -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Generate coverage report
        run: go tool cover -html=coverage.out -o coverage.html

      - name: Calculate coverage percentage
        id: coverage
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
          echo "percentage=$COVERAGE" >> $GITHUB_OUTPUT
          echo "Coverage: $COVERAGE%"
          
          # Create coverage badge data
          mkdir -p badges
          COVERAGE_INT=$(echo $COVERAGE | cut -d. -f1)
          
          # Set color based on coverage
          if [ $COVERAGE_INT -ge 90 ]; then
            COLOR="brightgreen"
          elif [ $COVERAGE_INT -ge 80 ]; then
            COLOR="green"
          elif [ $COVERAGE_INT -ge 70 ]; then
            COLOR="yellowgreen"
          elif [ $COVERAGE_INT -ge 60 ]; then
            COLOR="yellow"
          else
            COLOR="red"
          fi
          
          # Create JSON for shields.io endpoint
          echo "{\"schemaVersion\": 1, \"label\": \"coverage\", \"message\": \"${COVERAGE}%\", \"color\": \"${COLOR}\"}" > badges/coverage.json
          cat badges/coverage.json

      - name: Deploy coverage badge to gh-pages
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./badges
          destination_dir: badges
          keep_files: true
          commit_message: 'Update coverage badge data'

      - name: Upload coverage to artifacts
        uses: actions/upload-artifact@v6
        with:
          name: coverage-report
          path: |
            coverage.out
            coverage.html
          retention-days: 30

      - name: Comment coverage on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v8
        with:
          script: |
            const coverage = '${{ steps.coverage.outputs.percentage }}';
            const comment = `## 📊 Code Coverage Report\n\nCoverage: **${coverage}%**\n\n[View detailed coverage report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

      - name: Auto versioning
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        id: version
        uses: paulhatch/semantic-version@v5.4.0
        with:
          tag_prefix: "v"
          major_pattern: "(MAJOR|BREAKING CHANGE|\\[major\\])"
          major_regexp_flags: "gi"
          minor_pattern: "(MINOR|feat:|feature:|\\[minor\\])"
          minor_regexp_flags: "gi"
          version_format: "${major}.${minor}.${patch}"
          bump_each_commit: false
          search_commit_body: true
          change_path: "."
          enable_prerelease_mode: false

      - name: Create and push tag
        if: github.ref == 'refs/heads/main' && github.event_name == 'push' && steps.version.outputs.changed == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="v${{ steps.version.outputs.version }}"
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git tag -a "${VERSION}" -m "Release ${VERSION}"
          
          # Use authenticated push to ensure workflows are triggered
          git push "https://github-actions[bot]:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git" "${VERSION}"
          
          echo "✅ Created and pushed tag: ${VERSION}"

      - name: Trigger release workflow
        if: github.ref == 'refs/heads/main' && github.event_name == 'push' && steps.version.outputs.changed == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="v${{ steps.version.outputs.version }}"
          gh workflow run release.yml -f version="${VERSION}" --repo "${{ github.repository }}"
          echo "✅ Triggered release workflow for ${VERSION}"

      - name: Create version bump summary
        if: github.ref == 'refs/heads/main' && github.event_name == 'push' && steps.version.outputs.changed == 'true'
        run: |
          VERSION="v${{ steps.version.outputs.version }}"
          PREVIOUS="v${{ steps.version.outputs.previous_version }}"
          
          echo "## 🚀 Version Bump: ${VERSION}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Previous version:** ${PREVIOUS}" >> $GITHUB_STEP_SUMMARY
          echo "- **New version:** ${VERSION}" >> $GITHUB_STEP_SUMMARY
          echo "- **Version increment:** ${{ steps.version.outputs.increment }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The release workflow will automatically build and publish this version." >> $GITHUB_STEP_SUMMARY
