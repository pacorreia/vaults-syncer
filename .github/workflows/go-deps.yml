name: Go Dependencies Check

on:
  push:
    branches:
      - main
    paths:
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/go-deps.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'go.mod'
      - 'go.sum'

jobs:
  check-deps:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22.1'

      - name: Download dependencies
        run: go mod download

      - name: Verify dependencies
        run: go mod verify

      - name: Check for vulnerable dependencies
        run: go list -json -m all | go-mod-guard -e -l debug

      - name: Build
        run: go build -v ./...

      - name: Run tests
        run: go test -v ./...
        continue-on-error: true
