version: 2
updates:
  # GitHub Actions — keeps workflow action versions up to date
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "01:00"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    reviewers:
      - "pacorreia"
    commit-message:
      prefix: "chore(actions)"
      include: "scope"

  # Go modules
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "02:00"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    reviewers:
      - "pacorreia"
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
      include: "scope"

  # Docker
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:00"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    reviewers:
      - "pacorreia"
    commit-message:
      prefix: "chore(docker)"
      include: "scope"

  # Docker — mock vault (used in dev/test compose stack)
  - package-ecosystem: "docker"
    directory: "/testdata/mock-vault"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:00"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
    reviewers:
      - "pacorreia"
    commit-message:
      prefix: "chore(docker)"
      include: "scope"

  # Python (for mkdocs)
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "05:00"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    reviewers:
      - "pacorreia"
    commit-message:
      prefix: "chore(python)"
      include: "scope"
