# Docker Compose dev config — uses mock-vault service name for vault endpoints
# Used by: docker compose -f docker-compose.dev.yml up --build

vaults:
  - id: source_vault
    name: "Source Mock Vault"
    type: vaultwarden
    endpoint: "http://mock-vault:8000/api/ciphers"
    method: POST
    auth:
      method: bearer
      headers:
        token: "source_admin_token_12345"
    field_names:
      name_field: "name"
      value_field: "login"
    headers:
      Accept: "application/json"
      Content-Type: "application/json"
    timeout: 30
    skip_ssl_verify: true

  - id: target_vault
    name: "Target Mock Vault"
    type: vaultwarden
    endpoint: "http://mock-vault:8001/api/ciphers"
    method: POST
    auth:
      method: bearer
      headers:
        token: "target_admin_token_12345"
    field_names:
      name_field: "name"
      value_field: "login"
    headers:
      Accept: "application/json"
      Content-Type: "application/json"
    timeout: 30
    skip_ssl_verify: true

syncs:
  - id: local_sync
    source: source_vault
    targets:
      - target_vault
    sync_type: unidirectional
    enabled: true
    schedule: "*/1 * * * *"  # every minute
    filter:
      patterns:
        - "*"
      exclude: []
    retry_policy:
      max_retries: 3
      initial_backoff: 500
      max_backoff: 10000
      multiplier: 2.0

server:
  port: 8080
  address: "0.0.0.0"
  metrics_port: 9090
  metrics_address: "0.0.0.0"

logging:
  level: debug
  format: json
