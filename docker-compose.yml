services:
  vaults-syncer:
    build: .
    container_name: vaults-syncer
    ports:
      - "8080:8080"   # HTTP API + Web UI
      - "9090:9090"   # Prometheus metrics
    environment:
      - MASTER_ENCRYPTION_KEY=${MASTER_ENCRYPTION_KEY}
      # Optional: set DB_TYPE=postgres or DB_TYPE=mssql and provide DB_DSN.
      # Defaults to SQLite stored at /app/data/sync.db.
    volumes:
      - sync-data:/app/data
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/setup"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  sync-data:
    driver: local
