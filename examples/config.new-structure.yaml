# Example configuration demonstrating new vault type and auth structure
# This shows the new, enhanced configuration format that supports multiple vault types

vaults:
  # Vaultwarden with new structured auth
  - id: vaultwarden_prod
    type: vaultwarden                    # NEW: Explicit vault type
    name: "Production Vaultwarden"
    endpoint: "https://vault.pfmchome.cc/api/ciphers"
    auth:                                # NEW: Structured auth configuration
      method: oauth2
      oauth:
        token_endpoint: https://vault.pfmchome.cc/identity/connect/token
        client_id: "user.682f58c6-e2fe-4774-a6f3-be010a061224"
        client_secret: "bcUnuYv78gzg5NFxh51vlgMbfQYVyi"
        scope: "api"
        extra_params:                    # NEW: OAuth-specific parameters
          device_identifier: sync-daemon
          device_name: sync-daemon
          device_type: "14"
    field_names:
      name_field: "name"
      value_field: "name"
    headers:
      Accept: "application/json"
      Content-Type: "application/json"
    timeout: 30
    skip_ssl_verify: true

  # Mock target vault (simpler config for testing)
  - id: mock_target
    type: generic                        # NEW: Generic type
    name: "Target Mock Vault"
    endpoint: "http://mock-vaults:8001/api/ciphers"
    auth:
      method: bearer
      headers:
        token: "target_admin_token_12345"
    field_names:
      name_field: "name"
      value_field: "name"
    headers:
      Accept: "application/json"
      Content-Type: "application/json"
    timeout: 30
    skip_ssl_verify: true

syncs:
  - id: enhanced_oauth_sync
    source: vaultwarden_prod
    targets:
      - mock_target
    sync_type: unidirectional
    enabled: true
    concurrent_workers: 10               # Use concurrent processing
    schedule: "*/5 * * * *"
    filter:
      patterns:
        - "*"
      exclude: []
    retry_policy:
      max_retries: 2
      initial_backoff: 500
      max_backoff: 5000
      multiplier: 2.0

server:
  port: 8080
  address: 0.0.0.0
  metrics_port: 9090
  metrics_address: 0.0.0.0

logging:
  level: info
  format: json
