# Tool config for AWS Secrets Manager using the AWS CLI.
# Reference this file from your main config.yaml:
#
#   vaults:
#     - id: aws_prod
#       name: AWS Secrets Manager (prod)
#       type: tool
#       tool_config: ./tools/aws-secretsmanager.yaml
#
# The AWS CLI must be installed and configured (e.g. via environment variables
# or an IAM role). This example pins a default region; change it to match your
# environment if needed. Override individual environment variables per-vault by
# adding a vault-level `env:` block (not supported in the HTTP adapter).

env:
  AWS_DEFAULT_REGION: "us-east-1"

# Forward short-lived AWS credentials from the daemon's runtime environment.
# Values are read at each command execution, so STS-rotated tokens are always
# current without restarting the daemon.  Omit this block if the daemon
# already inherits these variables from its process environment via IAM role.
env_passthrough:
  - AWS_ACCESS_KEY_ID
  - AWS_SECRET_ACCESS_KEY
  - AWS_SESSION_TOKEN

operations:
  # List all secrets by name.
  list:
    command: aws
    args:
      - secretsmanager
      - list-secrets
      - --output
      - json
    output:
      format: json
      path: SecretList
      name_field: Name
    success_exit_codes: [0]

  # Retrieve the value of a single secret.
  # {{.Name}} is replaced with the secret name at runtime.
  get:
    command: aws
    args:
      - secretsmanager
      - get-secret-value
      - --secret-id
      - "{{.Name}}"
      - --output
      - json
    output:
      format: json
      path: SecretString
    success_exit_codes: [0]

  # Create or update a secret value.
  # {{.Name}} and {{.Value}} are replaced at runtime.
  set:
    command: aws
    args:
      - secretsmanager
      - put-secret-value
      - --secret-id
      - "{{.Name}}"
      - --secret-string
      - "{{.Value}}"
    success_exit_codes: [0]

  # Delete a secret (without a recovery window).
  delete:
    command: aws
    args:
      - secretsmanager
      - delete-secret
      - --secret-id
      - "{{.Name}}"
      - --force-delete-without-recovery
    success_exit_codes: [0]

  # Verify connectivity by checking the caller's identity.
  test:
    command: aws
    args:
      - sts
      - get-caller-identity
    success_exit_codes: [0]
