# Example configuration for secrets vault sync daemon

# Define the vaults to sync between
vaults:
  # Azure Key Vault
  - id: azure_keyvault
    name: Azure Key Vault
    endpoint: "https://my-keyvault.vault.azure.net/secrets"
    method: PUT
    auth_method: bearer
    auth_headers:
      token: "${AZURE_ACCESS_TOKEN}" # Can use env vars
    field_names:
      name_field: "name"
      value_field: "value"
    headers:
      Accept: "application/json"
    timeout: 30
    skip_ssl_verify: false

  # Vaultwarden instance
  - id: vaultwarden
    name: Vaultwarden
    endpoint: "https://vaultwarden.example.com/api/ciphers"
    method: POST
    auth_method: bearer
    auth_headers:
      token: "${VAULTWARDEN_TOKEN}"
    field_names:
      name_field: "name"
      value_field: "password"
    timeout: 30
    skip_ssl_verify: false

  # HashiCorp Vault
  - id: hashicorp_vault
    name: HashiCorp Vault
    endpoint: "https://vault.example.com/v1/secret/data"
    method: POST
    auth_method: bearer
    auth_headers:
      token: "${VAULT_TOKEN}"
    field_names:
      name_field: "secret_name"
      value_field: "secret_value"
    timeout: 30
    skip_ssl_verify: false

  # Custom API with API Key
  - id: custom_api
    name: Custom Secrets API
    endpoint: "https://api.example.com/secrets"
    method: PUT
    auth_method: api_key
    auth_headers:
      api_key: "${API_KEY}"
    field_names:
      name_field: "secret_name"
      value_field: "secret_value"
    headers:
      X-Custom-Header: "custom-value"
    timeout: 30
    skip_ssl_verify: false

# Define sync relationships between vaults
syncs:
  # One-way sync: Azure to Vaultwarden
  - id: azure_to_vaultwarden
    source: azure_keyvault
    targets:
      - vaultwarden
    sync_type: unidirectional
    enabled: true
    schedule: "0 */6 * * *" # Every 6 hours
    filter:
      patterns:
        - "db-*"        # Sync secrets starting with db-
        - "api-*"       # Sync secrets starting with api-
      exclude:
        - "*-dev"       # Exclude development secrets
    transforms: []
    retry_policy:
      max_retries: 3
      initial_backoff: 1000     # 1 second
      max_backoff: 60000        # 60 seconds
      multiplier: 2.0

  # One-way sync: Azure to HashiCorp Vault
  - id: azure_to_hashicorp
    source: azure_keyvault
    targets:
      - hashicorp_vault
    sync_type: unidirectional
    enabled: true
    schedule: "0 */12 * * *" # Every 12 hours
    filter:
      patterns:
        - "*"
      exclude:
        - "temp-*"
    retry_policy:
      max_retries: 5
      initial_backoff: 500
      max_backoff: 30000
      multiplier: 1.5

  # Bidirectional sync between HashiCorp Vault and Custom API (1:1 only)
  - id: hashicorp_custom_sync
    source: hashicorp_vault
    targets:
      - custom_api
    sync_type: bidirectional
    enabled: false # Disabled by default
    schedule: "0 */4 * * *" # Every 4 hours when enabled
    filter:
      patterns:
        - "*"
    retry_policy:
      max_retries: 3
      initial_backoff: 1000
      max_backoff: 60000
      multiplier: 2.0

# HTTP Server configuration
server:
  port: 8080
  address: 0.0.0.0
  metrics_port: 9090
  metrics_address: 0.0.0.0

# Logging configuration
logging:
  level: info          # debug, info, warn, error
  format: json         # json or text
